<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description"
    content="Galvanic Vestibular Stimulation BLE Controller — precision control interface for the GVS device." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GVS Controller" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>GVS Controller</title>
</head>

<body>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <div class="container">

    <header class="app-header">
      <div class="app-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2C8.5 2 5.7 4.8 5.7 8.3c0 2.3 1.2 4.3 3 5.4V20l1.3-1.3 1.3 1.3 1.3-1.3 1.3 1.3V13.7c1.8-1.1 3-3.1 3-5.4C18.3 4.8 15.5 2 12 2zm0 10.5c-2.3 0-4.2-1.9-4.2-4.2S9.7 4.1 12 4.1s4.2 1.9 4.2 4.2-1.9 4.2-4.2 4.2z" />
          <circle cx="12" cy="8.3" r="1.8" />
        </svg>
      </div>
      <div class="app-title">
        <h1>GVS Controller</h1>
        <p>Vestibular Stimulation Interface</p>
      </div>
      <div id="header-dot" class="header-status-dot" title="Connection status"></div>
    </header>

    <section class="card" id="connection-card" aria-label="Device Connection">
      <div id="connection-icon" class="connection-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--purple-light)" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5" />
        </svg>
      </div>
      <div id="connection-status" class="connection-status">Not Connected</div>
      <div id="connection-subtitle" class="connection-subtitle">Tap Connect to pair with GVS Controller</div>

      <button id="btn-connect" class="btn btn-connect">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5" />
        </svg>
        Connect to GVS Controller
      </button>
      <button id="btn-disconnect" class="btn btn-disconnect hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
        Disconnect
      </button>
    </section>

    <div id="controls-section" class="hidden">

      <button id="btn-start-stop" class="btn btn-start-stop" aria-label="Start or stop stimulation">
      </button>

      <p class="section-label">Stimulation Parameters</p>

      <section class="card" aria-label="Intensity Control">
        <div class="card-title">Intensity</div>

        <div class="intensity-label">
          <span>0%</span>
          <span id="ramp-status" class="ramp-status">Ramping…</span>
          <span>100%</span>
        </div>

        <div class="slider-wrapper">
          <button id="btn-intensity-minus" class="btn btn-icon-sm" aria-label="Decrease intensity by 1%">−</button>
          <div class="slider-track">
            <div id="intensity-fill" class="slider-fill" style="width:0%"></div>
            <input type="range" id="intensity-slider" min="0" max="100" value="0" step="1"
              aria-label="Intensity slider" />
          </div>
          <button id="btn-intensity-plus" class="btn btn-icon-sm" aria-label="Increase intensity by 1%">+</button>
          <span id="intensity-value" class="slider-value">0%</span>
        </div>

        <div class="ramp-settings" role="group" aria-label="Ramp rate setting">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round"
            aria-hidden="true">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
            <polyline points="17 6 23 6 23 12" />
          </svg>
          <label for="ramp-rate-slider">Safety Ramp Rate</label>
          <input type="range" id="ramp-rate-slider" min="1" max="20" value="5" step="1" aria-label="Ramp rate slider" />
          <span id="ramp-rate-val" class="ramp-rate-val">5%</span>
        </div>
      </section>

      <section class="card" aria-label="Direction Control">
        <div class="card-title">Direction</div>
        <div class="direction-toggle" role="group" aria-label="Current direction">
          <button class="dir-btn active" data-dir="0" aria-pressed="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12" />
              <polyline points="12 19 5 12 12 5" />
            </svg>
            Left · Anode
          </button>
          <button class="dir-btn" data-dir="1" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
            Right · Cathode
          </button>
        </div>
      </section>

      <section class="card" aria-label="Frequency Control">
        <div class="card-title">Frequency</div>
        <div class="freq-row">
          <div class="freq-input-wrap">
            <input type="number" id="freq-input" min="0" max="1000000" value="100" step="1"
              aria-label="Frequency value in Hz" />
            <span class="freq-unit">Hz</span>
          </div>
        </div>
        <div class="freq-presets" role="group" aria-label="Frequency presets">
          <button class="preset-btn" data-freq="1" aria-label="Set frequency 1 Hz">1 Hz</button>
          <button class="preset-btn" data-freq="10" aria-label="Set frequency 10 Hz">10 Hz</button>
          <button class="preset-btn" data-freq="100" aria-label="Set frequency 100 Hz">100 Hz</button>
          <button class="preset-btn" data-freq="1000" aria-label="Set frequency 1 kHz">1 kHz</button>
          <button class="preset-btn" data-freq="10000" aria-label="Set frequency 10 kHz">10 kHz</button>
          <button class="preset-btn" data-freq="100000" aria-label="Set frequency 100 kHz">100 kHz</button>
        </div>
      </section>

    </div>

  </div>

  <div id="estop-bar" role="complementary" aria-label="Emergency stop">
    <button id="btn-estop" aria-label="Emergency stop — immediately cuts all output">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm4 13.59L14.59 17 12 14.41 9.41 17 8 15.59l2.59-2.59L8 10.41 9.41 9 12 11.59 14.59 9 16 10.41l-2.59 2.59z" />
      </svg>
      Emergency Stop
    </button>
  </div>

  <script src="app.js"></script>
</body>

</html>
